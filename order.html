<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  @media (min-width: 480px) {
    #list-root { max-width: 390px !important; }
  }
  a { color: #DE052E; }
  a:hover { color: #b8041f; }
</style>
</helmet>
<div id="list-root" style="width:100%;min-height:844px;margin:0 auto;background:#F6F6F6;font-family:'Noto Sans TC','Roboto',sans-serif;color:#3E3E3E;position:relative;display:flex;flex-direction:column;">

  <!-- Header -->
  <div style="position:sticky;top:0;z-index:20;height:56px;background:#FFFFFF;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #F0F0F0;">
    <a href="index.html" style="text-decoration:none;border:none;background:none;padding:8px;margin-left:-8px;cursor:pointer;display:flex;align-items:center;position:relative;z-index:1;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3E3E3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>
    <div style="position:absolute;left:0;right:0;text-align:center;font-size:18px;font-weight:500;pointer-events:none;">我的訂單</div>
    <div style="flex:1;"></div>
    <button onClick="{{ toggleMenu }}" style="border:none;background:none;padding:8px;margin-right:-8px;cursor:pointer;display:flex;align-items:center;position:relative;z-index:1;">
      <svg width="24" height="24" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 9.99984C12.3672 9.99984 14.2857 8.1346 14.2857 5.83317C14.2857 3.53174 12.3672 1.6665 10 1.6665C7.63281 1.6665 5.71429 3.53174 5.71429 5.83317C5.71429 8.1346 7.63281 9.99984 10 9.99984ZM13 11.0415H12.4408C11.6975 11.3735 10.8705 11.5623 10 11.5623C9.12946 11.5623 8.3058 11.3735 7.55915 11.0415H7C4.51562 11.0415 2.5 13.0011 2.5 15.4165V16.7707C2.5 17.6333 3.21987 18.3332 4.10714 18.3332H15.8929C16.7801 18.3332 17.5 17.6333 17.5 16.7707V15.4165C17.5 13.0011 15.4844 11.0415 13 11.0415Z" fill="#3E3E3E"></path></svg>
    </button>
    <sc-if value="{{ menuOpen }}" hint-placeholder-val="">
      <div onClick="{{ closeMenu }}" style="position:fixed;inset:0;z-index:30;"></div>
      <div style="position:absolute;top:100%;left:0;right:0;z-index:40;background:#FFFFFF;border-radius:0 0 12px 12px;box-shadow:0 10px 24px rgba(0,0,0,0.14);padding:14px 16px;display:flex;flex-direction:column;gap:12px;">
        <sc-if value="{{ lineIn }}" hint-placeholder-val="">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <span style="display:flex;align-items:center;gap:10px;min-width:0;">
              <img src="assets/icons/line.svg" alt="" style="width:26px;height:26px;display:block;flex-shrink:0;">
              <span style="font-size:16px;font-weight:500;color:#3E3E3E;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ memberName }}</span>
            </span>
            <span style="display:flex;align-items:center;gap:20px;flex-shrink:0;">
              <a href="order.html" style="display:flex;align-items:center;gap:6px;text-decoration:none;color:#3E3E3E;font-size:15px;">
                <img src="assets/icons/order.svg" alt="" style="width:22px;height:22px;display:block;">
                我的訂單
              </a>
              <button onClick="{{ onLineLogout }}" style="border:none;background:none;padding:0;cursor:pointer;display:flex;">
                <img src="assets/icons/logout.svg" alt="登出" style="width:22px;height:22px;display:block;">
              </button>
            </span>
          </div>
          <div style="height:1px;background:#F0F0F0;"></div>
        </sc-if>
        <sc-if value="{{ lineOut }}" hint-placeholder-val="{{ true }}">
          <button onClick="{{ onLineLogin }}" style="width:100%;box-sizing:border-box;background:#FFFFFF;border:1px solid #E0E0E0;border-radius:10px;padding:11px;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;font-family:inherit;">
            <img src="assets/icons/line.svg" alt="" style="width:24px;height:24px;display:block;flex-shrink:0;">
            <span style="color:#3E3E3E;font-size:15px;font-weight:700;">登入LINE</span>
          </button>
        </sc-if>
        <sc-if value="{{ funIn }}" hint-placeholder-val="">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <span style="display:flex;align-items:center;gap:10px;min-width:0;">
              <img src="assets/icons/fun.svg" alt="" style="width:26px;height:26px;display:block;flex-shrink:0;">
              <span style="font-size:16px;font-weight:500;color:#3E3E3E;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ memberName }}</span>
            </span>
            <button onClick="{{ onFunLogout }}" style="border:none;background:none;padding:0;cursor:pointer;display:flex;flex-shrink:0;">
              <img src="assets/icons/logout.svg" alt="登出" style="width:22px;height:22px;display:block;">
            </button>
          </div>
          <div style="height:1px;background:#F0F0F0;"></div>
        </sc-if>
        <sc-if value="{{ funOut }}" hint-placeholder-val="{{ true }}">
          <button onClick="{{ onFunLogin }}" style="width:100%;box-sizing:border-box;background:#FFFFFF;border:1px solid #E0E0E0;border-radius:10px;padding:11px;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;font-family:inherit;">
            <img src="assets/icons/fun.svg" alt="" style="width:24px;height:24px;display:block;flex-shrink:0;">
            <span style="color:#3E3E3E;font-size:15px;font-weight:700;">登入瘋美食會員</span>
          </button>
        </sc-if>
        <a href="index.html" style="width:100%;box-sizing:border-box;background:#FFFFFF;border:1px solid #E0E0E0;border-radius:10px;padding:11px;display:flex;align-items:center;justify-content:center;text-decoration:none;">
          <span style="color:#3E3E3E;font-size:15px;font-weight:700;">回首頁加點</span>
        </a>
      </div>
    </sc-if>
  </div>

  <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:16px;">

    <div style="font-size:18px;font-weight:700;color:#3E3E3E;">進行中訂單</div>

    <sc-for list="{{ orders }}" as="order" hint-placeholder-count="5">
      <a href="order-detail.html" style="text-decoration:none;color:inherit;display:block;background:#FFFFFF;border-radius:12px;padding:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <span style="font-size:16px;font-weight:700;flex:1;min-width:0;">{{ order.store }}</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B5B5B5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
        <div style="margin-top:12px;display:flex;align-items:center;gap:12px;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:15px;color:#3E3E3E;">
              <span style="font-weight:500;">{{ order.price }}</span>
              <span style="color:#8A8A8A;margin-left:8px;">{{ order.method }}</span>
            </div>

            <sc-if value="{{ order.pickup }}" hint-placeholder-val="">
              <div style="margin-top:10px;display:flex;align-items:center;gap:6px;font-size:14px;color:#3E3E3E;">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 2.5C5.85685 2.5 2.5 5.85685 2.5 10C2.5 14.1431 5.85685 17.5 10 17.5C14.1431 17.5 17.5 14.1431 17.5 10C17.5 5.85685 14.1431 2.5 10 2.5ZM12.7971 11.9657L12.1922 12.7218C12.1525 12.7714 12.1035 12.8127 12.0478 12.8434C11.9921 12.874 11.931 12.8934 11.8678 12.9004C11.8047 12.9075 11.7407 12.902 11.6797 12.8843C11.6187 12.8666 11.5617 12.8371 11.5121 12.7974L9.48589 11.2937C9.34431 11.1804 9.23004 11.0367 9.15151 10.8732C9.07299 10.7097 9.03224 10.5307 9.03226 10.3493V5.64516C9.03226 5.51683 9.08324 5.39376 9.17398 5.30301C9.26472 5.21227 9.3878 5.16129 9.51613 5.16129H10.4839C10.6122 5.16129 10.7353 5.21227 10.826 5.30301C10.9168 5.39376 10.9677 5.51683 10.9677 5.64516V10L12.7218 11.2853C12.7714 11.325 12.8128 11.3741 12.8434 11.4298C12.8741 11.4855 12.8934 11.5467 12.9004 11.6099C12.9074 11.6731 12.9019 11.737 12.8842 11.7981C12.8664 11.8592 12.8368 11.9161 12.7971 11.9657Z" fill="#DF0730"></path></svg>
                <span>預計取餐 {{ order.pickup }}</span>
              </div>
            </sc-if>

            <sc-if value="{{ order.tags }}" hint-placeholder-val="">
              <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;">
                <sc-for list="{{ order.tags }}" as="tag" hint-placeholder-count="2">
                  <span style="{{ tag.style }}">{{ tag.text }}</span>
                </sc-for>
              </div>
            </sc-if>
          </div>

          <sc-if value="{{ order.badge }}" hint-placeholder-val="">
            <div style="flex-shrink:0;min-width:78px;border:2px solid #F5A623;border-radius:10px;padding:8px 10px;text-align:center;">
              <div style="font-size:13px;color:#3E3E3E;white-space:nowrap;">{{ order.badge.label }}</div>
              <div style="font-size:26px;font-weight:700;color:#3E3E3E;line-height:1.15;">{{ order.badge.number }}</div>
            </div>
          </sc-if>
        </div>

        <sc-if value="{{ order.payNote }}" hint-placeholder-val="">
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid #F0F0F0;font-size:14px;color:#3E3E3E;line-height:1.6;">
            請於10:00內 <span onClick="{{ goPay }}" style="color:#DE052E;text-decoration:underline;font-weight:700;cursor:pointer;">前往付款</span>，逾時將自動取消訂單
          </div>
        </sc-if>
      </a>
    </sc-for>

  </div>
</div>
</x-dc>
<script data-dc-script type="text/babel">
class Component extends DCLogic {
  state = {
    menuOpen: false,
    lineLoggedIn: (() => { try { return localStorage.getItem('lineMember') === '1'; } catch (e) { return false; } })(),
    bound: (() => { try { return localStorage.getItem('funMember') === '1'; } catch (e) { return false; } })(),
  };

  renderVals() {
    const tag = (text, bg, color) => ({
      text,
      style: `display:inline-block;background:${bg};color:${color};font-size:13px;font-weight:500;padding:3px 10px;border-radius:6px;white-space:nowrap;`,
    });
    const GREEN = ['#E7F6EC', '#2E9E5B'];
    const AMBER = ['#FFF3E0', '#E08A2B'];
    const RED = ['#FDE9EC', '#DE052E'];

    const orders = [
      {
        store: '石二鍋-中壢家樂福中山東店', price: 'NT$1000', method: '線上支付',
        pickup: 'MM/DD 18:30 - 18:40',
        tags: [tag('已付款', ...GREEN), tag('餐點已完成，待取餐', ...AMBER)],
        badge: { label: '取餐編號', number: '12' },
      },
      {
        store: '石二鍋-中壢家樂福中山東店', price: 'NT$1000', method: '線上支付',
        tags: [tag('等待付款', ...RED)],
        payNote: true,
      },
      {
        store: '石二鍋-中壢家樂福中山東店', price: 'NT$1000', method: '線上支付',
        tags: [tag('已付款', ...GREEN), tag('訂單已成立', ...AMBER)],
        badge: { label: '內用震動器', number: '27' },
      },
      {
        store: '石二鍋-中壢家樂福中山東店', price: 'NT$1000', method: '線上支付',
        tags: [tag('訂單已取消', ...RED)],
      },
      {
        store: '石二鍋-中壢家樂福中山東店', price: 'NT$1000', method: '線上支付',
        tags: [tag('已付款', ...GREEN), tag('訂單已完成', ...AMBER)],
        badge: { label: '內用桌號', number: '12' },
      },
    ];

    return { orders,
      menuOpen: this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      closeMenu: () => this.setState({ menuOpen: false }),
      memberName: 'Amy',
      lineIn: this.state.lineLoggedIn, lineOut: !this.state.lineLoggedIn,
      funIn: this.state.bound, funOut: !this.state.bound,
      onLineLogin: () => { try { localStorage.setItem('lineMember','1'); } catch(e){} this.setState({ lineLoggedIn: true }); },
      onLineLogout: () => { try { localStorage.removeItem('lineMember'); } catch(e){} this.setState({ lineLoggedIn: false }); },
      onFunLogin: () => { try { localStorage.setItem('funMember','1'); } catch(e){} this.setState({ bound: true }); },
      onFunLogout: () => { try { localStorage.removeItem('funMember'); } catch(e){} this.setState({ bound: false }); },
      goPay: (e) => { e.preventDefault(); e.stopPropagation(); },
    };
  }
}
</script>
</body>
</html>
